version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: haul-ai-postgres
    environment:
      POSTGRES_USER: haul
      POSTGRES_PASSWORD: haul_dev_password_change_in_prod
      POSTGRES_DB: haul_ai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haul -d haul_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - haul-network

  redis:
    image: redis:7-alpine
    container_name: haul-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - haul-network

volumes:
  postgres_data:
  redis_data:

networks:
  haul-network:
    driver: bridge
